name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: |
          npx install @capacitor/cli @capacitor/core
          npx cap init "Phrasal Verb Duel" "com.seuapp.phrasalduel" --web-dir=dist
          npx vite build
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          ls -R
          cd android
          ls -la
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

