name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install react-joyride@latest lucide-react canvas-confetti --save --legacy-peer-deps
          npm install @capacitor/cli @capacitor/core @capacitor/android --save-dev --legacy-peer-deps

      - name: Build Web App & Capacitor Sync
        run: |
          npx vite build
          # Garante que a plataforma exista
          npx cap add android || echo "Platform already exists"
          
          # Injeta a correção de conflito do Kotlin no build.gradle via comando de sistema
          echo "
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }" >> android/build.gradle
          
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # Limpeza total para garantir que não reste lixo de builds falhos
          ./gradlew clean
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

