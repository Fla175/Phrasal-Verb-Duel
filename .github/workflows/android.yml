name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web App & Capacitor Sync
        run: |
          npx vite build
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Fix JDK Path & Kotlin Versions
        run: |
          # Força o Gradle a usar o JDK 17 configurado pelo GitHub Actions
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          
          # Correção dinâmica sem tipagem estática para evitar quebra de sintaxe no Groovy
          echo -e "\nsubprojects { configurations.all { resolutionStrategy.eachDependency { d -> if (d.requested.group == 'org.jetbrains.kotlin') { d.useVersion '1.9.20' } } } }" >> android/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

