name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Build Web App & Capacitor Sync
        run: |
          npx vite build
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Configure Gradle Environment
        run: |
          # Força o Gradle a herdar o JDK 21 correto do ambiente do runner
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          
          # Força as versões do Kotlin de forma limpa (corrige erro de classes duplicadas)
          echo -e "\nsubprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.20'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.20' } } }" >> android/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

